seed: 42
batch_size: 256
eval_batch_size: 256
log_interval: 10
eval_interval: 100
total_steps: 3000

data:
  max_digits: 3
  eval_split: 0.2

model:
  _target_: tiny.model.Transformer
  n_layers: 6
  d_model: 384
  d_ffw: 1152
  n_heads: 8
  n_kv: 2
  vocab_size: 12 # digits 0-9, '+', '='
  # n_experts: 8
  # k_experts: 2

optimizer:
  _target_: optax.adamw
  learning_rate:
    _target_: optax.cosine_decay_schedule
    init_value: 3e-4
    decay_steps: ${total_steps}
    alpha: 0.1
